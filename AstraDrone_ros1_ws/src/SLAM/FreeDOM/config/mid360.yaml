sensor:
  min_range: 0.2    # Ignore points closer than this distance
  max_range: 40.0   # Ignore points farther than this distance
  min_z: -10.0      # Ignore points with z-value lower than this (relative to LiDAR)
  max_z: 10.0       # Ignore points with z-value higher than this (relative to LiDAR)

  real_min_range: 0.5
  real_max_range: 10
  # an zhuang 
  lidar_x: 0.00
  lidar_y: 0.00
  lidar_z: 0.05

  lidar_roll_deg: 0.0
  lidar_pitch_deg: 30.0
  lidar_yaw_deg: 0.0

  flag_dynamic: false   #是否开启动态点云


map:
  sub_voxel_size: 0.13 # 0.1
  voxel_depth: 2
  block_depth: 5

  # When local map is enabled, map outside the local map range will be removed
  enable_local_map: true
  local_map_range: 40.0     # Maximum distance of local map
  local_map_min_z: -8.0    # Minimum height of local map
  local_map_max_z: 8.0     # Maximum height of local map

  # Raycast range limit
  raycast_max_range: 40.0   # Maximum raycast distance
  raycast_min_z: -10.0      # Minimum raycast height
  raycast_max_z: 10.0       # Maximum raycast height

# 6 20
  counts_to_free: 6         # Use counts_to_free = 3 for KITTI seq.01
  counts_to_revert: 20

  conservative_connectivity: 26
  aggressive_connectivity: 124

raycast_enhancement:
  enable_raycast_enhancement: true

  lidar_horizon_fov_degree: 360.0
  lidar_vertical_fov_upper_degree: 59.0
  lidar_vertical_fov_lower_degree: 0.0
  depth_image_vertical_lines: 64

  depth_image_min_range: 0.2
  max_raycast_enhancement_range: 80.0
  raycast_enhancement_depth_margin: 0.2

  inpaint_size: 3
  erosion_size: 0
  min_raycast_enhancement_area: 0.0
  depth_image_top_margin: 0

  enable_fov_mask: false
  fov_mask_name: ""

num_threads: 8