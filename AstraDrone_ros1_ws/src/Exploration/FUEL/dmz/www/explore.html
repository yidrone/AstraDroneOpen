<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover"/>
  <title>探索</title>

  <script src="./vendor/eventemitter2.min.js"></script>
  <script src="./vendor/roslib.min.js"></script>
  <script src="./vendor/ros3d.js"></script>

  <style>
    :root{
      --bg:#0f0f10; --fg:#eaeaea; --line:#2a2a2a;
      --navH:64px; --safeB: env(safe-area-inset-bottom, 0px);
      --hudBg: rgba(0,0,0,0.50);
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--fg);font-family:system-ui,-apple-system,Segoe UI,Roboto;overflow:hidden;}
    #viewer{position:fixed;left:0;right:0;top:0;bottom: calc(var(--navH) + var(--safeB));z-index:1;}
    #hud{
      position:fixed;left:10px;top:10px;right:10px;
      background:var(--hudBg);
      padding:10px 10px;border-radius:14px;
      font-size:13px;line-height:1.35;
      z-index:2147483646;
      pointer-events:none;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,0.08);
    }
    .row{display:flex;justify-content:flex-start;gap:8px;flex-wrap:wrap;}
    .pill{font-size:12px;padding:6px 10px;border-radius:999px;background:rgba(30,30,30,0.9);opacity:.98;}
    .ok{background:rgba(30,80,30,0.85)}
    .bad{background:rgba(90,30,30,0.85)}
    .muted{opacity:.85}

    #nav{
      position:fixed;left:0;right:0;bottom:0;
      height: calc(var(--navH) + var(--safeB));
      padding-bottom: var(--safeB);
      display:flex;background:#111;border-top:1px solid var(--line);
      z-index:2147483647;
      pointer-events:auto;
      touch-action: manipulation;
    }
    #nav button{
      flex:1;margin:0;border-radius:0;border:none;background:#111;color:#fff;
      font-size:16px;font-weight:900;outline:none;
    }
    #nav .active{background:#1c1c1c;}
  </style>
</head>
<body>

<div id="viewer"></div>

<div id="hud">
  <div class="row">
    <div class="pill muted" id="ws">rosbridge: 连接中…</div>
    <div class="pill muted" id="tf">TF: --</div>
    <div class="pill muted" id="cloud">Cloud: --</div>
    <div class="pill muted" id="odom">ODOM: --</div>
    <!-- UAV pill 已移除 -->
  </div>
</div>

<div id="nav">
  <button onclick="go('/')">状态</button>
  <button class="active" onclick="go('/explore')">探索</button>
  <button onclick="go('/map')">地图</button>
</div>

<script>
/* ===================== Config ===================== */
const WS  = `${location.protocol === "https:" ? "wss" : "ws"}://${location.hostname}:9090`;

const FIXED_FRAME = 'world';
const CLOUD_TOPIC = '/freedom/static_pointcloud';
const ODOM_TOPIC  = '/mavros/local_position/odom';
const ODOM_FRAME  = 'map';

// 原点坐标轴参数（你可以按需要调大/调小）
const ORIGIN_AXIS_LEN = 1.0;     // 轴长度（单位：米）
const ORIGIN_AXIS_RAD = 0.02;    // 轴粗细

/* ===================== Helpers ===================== */
function go(p){ window.location.href = p; }

function setPill(id, text, state){
  const el = document.getElementById(id);
  if(!el) return;
  el.textContent = text;
  el.classList.remove('ok','bad','muted');
  if(state === 'ok') el.classList.add('ok');
  else if(state === 'bad') el.classList.add('bad');
  else el.classList.add('muted');
}

/* ===================== Viewer ===================== */
let viewer = null;

function initViewer(){
  if(viewer) return;

  const navH = document.getElementById("nav").getBoundingClientRect().height;

  viewer = new ROS3D.Viewer({
    divID: 'viewer',
    width: window.innerWidth,
    height: window.innerHeight - navH,
    antialias: false,
    displayPanAndZoomFrame: false
  });

  // 网格
  viewer.addObject(new ROS3D.Grid());

  // ✅ 原点坐标轴（固定在 FIXED_FRAME 的 (0,0,0)）
  // ROS3D 支持 ROS3D.Axes（常见版本都有）。如果你本地 ros3d.js 太老没有 Axes，
  // 我再给你一个 Arrow/Line 的兼容实现。
  try{
    const axes = new ROS3D.Axes({
      shaftRadius: ORIGIN_AXIS_RAD,
      headRadius: ORIGIN_AXIS_RAD * 2.0,
      headLength: ORIGIN_AXIS_LEN * 0.25,
      length: ORIGIN_AXIS_LEN
    });
    viewer.addObject(axes);
  }catch(e){
    // 静默：不影响主功能
  }

  resizeViewer();
}

function resizeViewer(){
  if(!viewer) return;
  const navH = document.getElementById("nav").getBoundingClientRect().height;
  viewer.resize(window.innerWidth, window.innerHeight - navH);
}

window.addEventListener("resize", resizeViewer);
window.addEventListener("orientationchange", ()=>setTimeout(resizeViewer, 120));

/* ===================== ROS / TF / Viz ===================== */
let ros = null;
let tfClient = null;

let cloudViz = null;
let odomViz = null;
let odomRaw = null;

let reconnectMs = 800;
let reconnectTimer = null;
let connectInFlight = false;

function cleanupROS(){
  try{ if(odomRaw) { odomRaw.unsubscribe(); } }catch(e){}
  odomRaw = null;

  try{ if(tfClient) { tfClient.dispose && tfClient.dispose(); } }catch(e){}
  tfClient = null;

  cloudViz = null;
  odomViz = null;

  try{ if(ros) { ros.close(); } }catch(e){}
  ros = null;

  setPill("ws","rosbridge: 断开", "bad");
  setPill("tf","TF: --", "muted");
  setPill("cloud","Cloud: --", "muted");
  setPill("odom","ODOM: --", "muted");
}

function scheduleReconnect(){
  if(reconnectTimer) return;
  reconnectTimer = setTimeout(()=>{
    reconnectTimer = null;
    connectROS();
  }, reconnectMs);
  reconnectMs = Math.min(8000, Math.floor(reconnectMs * 1.6));
}

function connectROS(){
  if(connectInFlight) return;
  connectInFlight = true;

  if(document.hidden){
    connectInFlight = false;
    scheduleReconnect();
    return;
  }

  try{ if(ros) ros.close(); }catch(e){}
  ros = new ROSLIB.Ros({ url: WS });

  ros.on("connection", ()=>{
    connectInFlight = false;
    reconnectMs = 800;

    setPill("ws", "rosbridge: 已连接", "ok");

    // TF
    try{
      tfClient = new ROSLIB.TFClient({
        ros: ros,
        fixedFrame: FIXED_FRAME,
        angularThres: 0.02,
        transThres: 0.02,
        rate: 10
      });

      let tfOkOnce = false;
      tfClient.subscribe(ODOM_FRAME, ()=>{
        if(!tfOkOnce){
          tfOkOnce = true;
          setPill("tf", "TF: ✅ world->map", "ok");
        }
      });
    }catch(e){
      setPill("tf","TF: ❌", "bad");
    }

    // 点云
    try{
      cloudViz = new ROS3D.PointCloud2({
        ros,
        tfClient,
        rootObject: viewer.scene,
        topic: CLOUD_TOPIC,

        max_pts: 1000000,     // 关键：上限调大（>= 84558）
        pointRatio: 1,       // 1=不抽点；比如 2=每2个取1个
        messageRatio: 1,     // 1=每条消息都画；比如 2=每2条画1条

        material: { size: 0.05 }
      });
      setPill("cloud","Cloud: ✅", "ok");
    }catch(e){
      setPill("cloud","Cloud: ❌", "bad");
    }

    // Odom 可视化（失败就降级 raw）
    try{
      odomViz = new ROS3D.Odometry({
        ros: ros,
        tfClient: tfClient,
        rootObject: viewer.scene,
        topic: ODOM_TOPIC,
        keep: 1,
        color: 0xff3300,
        length: 0.6,
        headLength: 0.15,
        shaftDiameter: 0.12,
        headDiameter: 0.225
      });
      setPill("odom","ODOM: ✅", "ok");
    }catch(e){
      // 不再显示 UAV pill，所以 raw 订阅只保留“保活/验证”意义（也可以直接删掉）
      setPill("odom","ODOM: ✅(raw)", "ok");
      odomRaw = new ROSLIB.Topic({ ros, name: ODOM_TOPIC, messageType: 'nav_msgs/Odometry' });
      odomRaw.subscribe(()=>{});
    }
  });

  ros.on("error", ()=>{
    connectInFlight = false;
    setPill("ws","rosbridge: 连接失败", "bad");
  });

  ros.on("close", ()=>{
    connectInFlight = false;
    cleanupROS();
    scheduleReconnect();
  });
}

/* ===================== Page lifecycle ===================== */
function boot(){
  initViewer();
  cleanupROS();
  connectROS();
}

document.addEventListener("visibilitychange", ()=>{
  if(document.hidden){
    cleanupROS();
  }else{
    connectROS();
  }
});

boot();
</script>
</body>
</html>
